<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças do Mês</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary);">UP - Finanças</h2>

    <div class="card">
        <input type="hidden" id="editId">
        <input type="text" id="desc" placeholder="Descrição">
        <input type="number" id="valor" placeholder="Valor R$ 0,00" step="0.01">
        <input type="date" id="data">
        
        <select id="categoria">
            <option value="Água">💧 Água</option>
            <option value="Luz">⚡ Luz</option>
            <option value="Gás">🔥 Gás</option>
            <option value="Cartão/Crédito">💳 Cartão/Crédito</option>
            <option value="Celular">📱 Celular</option>
            <option value="Cerrado">🌳 Cerrado</option>
            <option value="Iptu">🏠 Iptu</option>
            <option value="Internet">🌐 Internet</option>
            <option value="Empréstimo">💸 Empréstimo</option>
            <option value="Pres. Carro">🚗 Pres. Carro</option>
            <option value="Outros">📁 Outros</option>
        </select>

        <select id="tipo">
            <option value="-">🔴 Saída (Gasto)</option>
            <option value="+">🟢 Entrada (Receita)</option>
        </select>
        <button id="btnSalvar" onclick="window.salvarRegistro()">SALVAR REGISTRO</button>
    </div>

    <div class="card" style="padding: 10px; display: flex; align-items: center; gap: 10px; justify-content: center;">
        <label>📅 Mês:</label>
        <input type="month" id="filtroMes" style="margin: 0; width: auto;">
    </div>

    <div class="card">
        <div class="chart-container"><canvas id="graficoPizza"></canvas></div>
    </div>

    <div class="card">
        <div class="resumo-item" style="color: var(--entrada);">Entradas: <span id="totalEntradas">R$ 0,00</span></div>
        <div class="resumo-item" style="color: var(--saida);">Saídas: <span id="totalSaidas">R$ 0,00</span></div>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <div class="resumo-item" style="font-size: 1.2rem;">Saldo: <span id="saldoFinal">R$ 0,00</span></div>
        
        <button class="btn-admin" style="color: var(--entrada); border-color: var(--entrada);" onclick="window.toggleEntradas()">⚙ GERENCIAR ENTRADAS</button>
        
        <div id="listaEntradasContainer">
            <table style="width: 100%;">
                <tbody id="listaEntradasEdit"></tbody>
            </table>
        </div>
    </div>

    <div class="card" style="padding: 10px; overflow-x: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0; font-size: 1rem; color: var(--primary);">Lista de Despesas</h3>
            <button class="btn-admin" onclick="window.toggleAcoes()">⚙ GERENCIAR DESPESAS</button>
        </div>
        <table style="width: 100%;">
            <tbody id="listaContas"></tbody>
        </table>
    </div>
</div>

<footer>
    Desenvolvido por: <b>AstoBicalho</b><br>
    © 2026 - Urbano Publicidade
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
